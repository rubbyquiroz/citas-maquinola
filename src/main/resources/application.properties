# Spring Boot
spring.application.name=clinica-citas

# Server
server.port=${PORT:8080}

# JSP View Resolver
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# Logging
logging.level.com.clinica=DEBUG
logging.level.org.springframework.security=INFO

# Base de datos MySQL
# Local (XAMPP) usa los valores por defecto. En Railway, las variables
# MYSQLHOST/MYSQLPORT/MYSQLDATABASE/MYSQLUSER/MYSQLPASSWORD las inyecta
# automaticamente el plugin de MySQL del proyecto.
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:clinica_citas}?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Railway / reverse proxy
server.forward-headers-strategy=framework
